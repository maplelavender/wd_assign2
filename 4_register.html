<main>
<form id="regForm" method="post"
action="http://mercury.swin.edu.au/it000000/cos10005/regtest.php">
    <h2>Account Registration</h2>
    <hr>
    <fieldset class="form">
			<legend>Account Information</legend>
			<div class="textInput">
				<label for="user">Username</label>
				<input id="user" type="text" name="user" />
			</div>
            <div class="textInput">
				<label for="email">Email Address</label>
				<input id="email" type="text" name="email" />
			</div>
            <div class="textInput">
				<label for="phone">Phone Number</label>
				<input id="phone" type="text" name="phone" />
			</div>
			<div class="textInput">
				<label for="pwd1">Password</label>
				<input id="pwd1" type="password" name="pwd1" />
			</div>
			<div class="textInput">
				<label for="pwd2">Confirm Password</label>
				<input id="pwd2" type="password" name="pwd2" />
			</div>
		</fieldset>
        <fieldset class="form">
			<legend>User Information</legend>
            <div class="radioInput">
				<span class="radioLabel">Gender</span>
				<input id="genm" type="radio" name="gender" value="M" />
				<label for="genm">Male</label>
				<input id="genf" type="radio" name="gender" value="F" />
				<label for="genf">Female</label>
			</div>
            <div class="selectInput">
            <label for="dietary">Dietary Preferences</label>
                <select name="dietary" id="dietary">
                    <option value="none">None</option>
                    <option value="halal">Halal</option>
                    <option value="vegetarian">Vegetarian</option>
                    <option value="vegan">Vegan</option>
                </select>
            </div>
            <div class="textInput">
				<label for="region">Country/Region</label>
				<input id="region" type="text" name="region" />
			</div>
        </fieldset>
    <div class="buttonInput">
        <input type="submit" value="Confirm" />
    </div>
</form>
